name: build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to run against (e.g., v1.2.3)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FASM and Python3
        run: |
          sudo apt-get update
          sudo apt-get install -y fasm python3 python3-pip
          fasm --version || echo "FASM installed"
          python3 --version

      - name: Create build directory
        run: mkdir -p build/

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Run build script
        run: ./build.sh

      # Conditional Step: If the event is 'release', use upload_url directly
      - name: Upload binaries to release (for release event)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./natrium.img
          asset_name: natrium.img
          asset_content_type: application/octet-stream
        if: github.event_name == 'release'

      # If triggered by workflow_dispatch, create a release and upload the binary
      - name: Create release (for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          echo "Creating release for tag $TAG_NAME"
          
          # Create a release via the GitHub API
          response=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"tag_name": "'"${TAG_NAME}"'", "name": "'"${TAG_NAME}"'", "body": "Release created manually."}' \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          # Extract the upload URL for the new release
          upload_url=$(echo "$response" | jq -r .upload_url | sed -e 's/{?name,label}//')
          
          # Store the upload URL in a file for later use
          echo "::set-output name=upload_url::$upload_url"
          
      # Upload binaries after creating a release manually (for workflow_dispatch)
      - name: Upload binaries to release (for workflow_dispatch)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}  # Get from previous step
          asset_path: ./natrium.img
          asset_name: natrium.img
          asset_content_type: application/octet-stream
        if: github.event_name == 'workflow_dispatch'
