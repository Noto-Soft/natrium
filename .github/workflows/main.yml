name: build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FASM and Python3
        run: |
          sudo apt-get update
          sudo apt-get install -y fasm python3 python3-pip
          fasm --version || echo "FASM installed"
          python3 --version

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Run build script
        run: ./build.sh
