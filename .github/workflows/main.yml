name: build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to run against (e.g., v1.2.3)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FASM and Python3
        run: |
          sudo apt-get update
          sudo apt-get install -y fasm python3 python3-pip
          fasm --version || echo "FASM installed"
          python3 --version

      - name: Create build directory
        run: mkdir -p build/

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Run build script
        run: ./build.sh

      - name: Upload binaries to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url || '' }}  # Use the upload_url from the release event
          asset_path: ./natrium.img
          asset_name: natrium.img
          asset_content_type: application/octet-stream
        if: github.event_name == 'release'  # Only run the upload if the event is a release event

      # Optionally, if the manual dispatch is used, you could add an additional step to create a release and upload the asset manually.
