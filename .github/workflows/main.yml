name: Build and Upload Artifact

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to run against (e.g., v1.2.3)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FASM and Python3
        run: |
          sudo apt-get update
          sudo apt-get install -y fasm python3 python3-pip
          fasm --version || echo "FASM installed"
          python3 --version

      - name: Create build directory
        run: mkdir -p build/

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Run build script
        run: ./build.sh

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: natrium-img
          path: ./natrium.img

